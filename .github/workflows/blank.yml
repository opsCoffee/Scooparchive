name: Remove Python ENV

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  cleanup:
    runs-on: windows-latest
    steps:
    - name: Remove Python ENV
      shell: powershell
      run: |
        # 清理 PATH
        $newPath = ($env:PATH -split ';' | Where-Object { 
          -not ($_ -like '*Python*') -and
          -not ($_ -like '*hostedtoolcache\windows\Python*')
        }) -join ';'
        $env:PATH = $newPath
        
        # 清理 Python 相关环境变量
        Get-ChildItem env: | Where-Object { 
          $_.Name -like '*PYTHON*' -or 
          $_.Value -like '*Python*'
        } | ForEach-Object { Remove-Item env:$($_.Name) -ErrorAction SilentlyContinue }
        
        # 验证
        Write-Host "Remaining Python paths:"
        $env:PATH -split ';' | Where-Object { $_ -like '*Python*' }

    - name: Show PATH Statistics
      shell: powershell
      run: |
          Write-Host "================================================================" -ForegroundColor Blue
          Write-Host "                        PATH Statistics                          " -ForegroundColor Blue
          Write-Host "================================================================" -ForegroundColor Blue
          
          function Get-PathStats {
              param (
                  [string]$PathType,
                  [string]$PathValue
              )
              $paths = $PathValue -split ';' | Where-Object { $_ }
              $existingPaths = $paths | Where-Object { Test-Path $_ }
              $missingPaths = $paths | Where-Object { -not (Test-Path $_) }
              
              Write-Host "`n$PathType PATH Statistics:" -ForegroundColor Green
              Write-Host "Total entries: $($paths.Count)" -ForegroundColor Yellow
              Write-Host "Existing paths: $($existingPaths.Count)" -ForegroundColor Green
              Write-Host "Missing paths: $($missingPaths.Count)" -ForegroundColor Red
          }

          # System PATH Statistics
          $systemPath = [System.Environment]::GetEnvironmentVariable('Path', [System.EnvironmentVariableTarget]::Machine)
          Get-PathStats "System" $systemPath

          # User PATH Statistics
          $userPath = [System.Environment]::GetEnvironmentVariable('Path', [System.EnvironmentVariableTarget]::User)
          Get-PathStats "User" $userPath

          # Process PATH Statistics
          Get-PathStats "Process" $env:Path
